name: Telegram Encoder Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      log_level:
        description: Logging level
        default: INFO
        type: choice
        options: [DEBUG, INFO, WARNING, ERROR]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install TDLib
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libtdjson-dev 2>/dev/null ||
            sudo apt-get install -y -qq libtdjson 2>/dev/null ||
            echo "TDLib package not found; pytdbot may use bundled lib"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check imports
        run: python -c "import telegram_bot; print('OK')"

  run:
    if: github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install TDLib
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libtdjson-dev 2>/dev/null ||
            sudo apt-get install -y -qq libtdjson 2>/dev/null ||
            echo "TDLib package not found; pytdbot may use bundled lib"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download .env from secret gist
        run: curl -sL "${{ secrets.ENV_GIST_URL }}" -o .env
      - name: Run bot
        env:
          BOT_SETTINGS_PATH: bot_settings.json
          BOT_OUTPUT_DIR: encoded
          MAX_JOBS_PER_USER: "3"
          STALE_FILE_HOURS: "24"
        run: python -m telegram_bot
