name: Telegram Encoder Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      log_level:
        description: Logging level
        default: INFO
        type: choice
        options: [DEBUG, INFO, WARNING, ERROR]

env:
  PYTHON_VERSION: "3.12"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install system deps (TDLib, FFmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libtdjson-dev 2>/dev/null ||
          sudo apt-get install -y -qq ffmpeg libtdjson 2>/dev/null ||
          { sudo apt-get install -y -qq ffmpeg && echo "TDLib not found, pytdbot may use bundled lib"; }
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify imports
        run: python -c "import telegram_bot; print('OK')"

  run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install system deps (TDLib, FFmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libtdjson-dev 2>/dev/null ||
          sudo apt-get install -y -qq ffmpeg libtdjson 2>/dev/null ||
          { sudo apt-get install -y -qq ffmpeg && echo "TDLib not found, pytdbot may use bundled lib"; }
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download .env from secret gist
        run: |
          if [ -z "${{ secrets.ENV_GIST_URL }}" ]; then
            echo "::error::ENV_GIST_URL secret is not set"
            exit 1
          fi
          curl -sfL "${{ secrets.ENV_GIST_URL }}" -o .env || {
            echo "::error::Failed to download .env from gist"
            exit 1
          }
      - name: Run bot
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'INFO' }}
          BOT_SETTINGS_PATH: bot_settings.json
          BOT_OUTPUT_DIR: encoded
          MAX_JOBS_PER_USER: "3"
          STALE_FILE_HOURS: "24"
        run: python -m telegram_bot
